<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doktura AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1f2937; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
</head>
<body class="fixed inset-0 flex h-screen w-full bg-white hidden" id="mainAppBody">
    
    <!-- Left Sidebar -->
    <div class="w-64 bg-[#111827] text-white flex flex-col shrink-0">
        <div class="p-6 border-b border-gray-800">
            <h2 class="text-xl font-bold text-[#00AEEF]">Doktura AI</h2>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <button class="w-full flex items-center space-x-3 bg-gray-800 p-3 rounded-lg text-white">
                <span class="font-medium text-sm">AI Doctor</span>
            </button>
            <!-- Add your other sidebar buttons here (Settings, Reports, etc.) -->
        </div>

        <div class="p-4 border-t border-gray-800 flex flex-col">
            <div class="flex items-center justify-between">
                <span id="appUserName" class="text-sm font-medium truncate">Loading...</span> 
                <button id="logoutBtn" class="text-red-400 hover:text-red-300 text-xs font-bold uppercase">Logout</button>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col relative h-full bg-white overflow-hidden">
        <div id="app-chat-history" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-8">
            <!-- Messages load here -->
        </div>

        <div class="w-full shrink-0 pt-4 pb-6 px-6 bg-white border-t border-gray-100 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
            <div class="max-w-3xl mx-auto relative flex items-center shadow-[0_5px_20px_rgba(0,0,0,0.08)] rounded-full border border-gray-200 bg-white p-1">
                <input type="text" id="app-chat-input" class="w-full bg-transparent pl-4 pr-14 py-3 focus:outline-none text-gray-800" placeholder="Type your symptoms to Doktura AI..." onkeypress="if(event.key === 'Enter') sendAppChat()">
                <button onclick="sendAppChat()" class="absolute right-2 p-2.5 bg-[#00AEEF] text-white rounded-full hover:bg-[#0099d1] transition">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const firebaseConfig = { /* YOUR FIREBASE CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const API_BASE = 'https://api.doktura.ai'; 
        
        let userToken = "";
        let userName = "Patient";
        let sessionId = Date.now().toString();

        // 1. Kick out unauthenticated users
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html"; // Redirect to landing
            } else {
                userToken = await user.getIdToken();
                document.getElementById("mainAppBody").classList.remove("hidden"); // Reveal app
                
                // Get user info from backend
                const res = await fetch(`${API_BASE}/api/user/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${userToken}` },
                    body: JSON.stringify({ email: user.email })
                });
                const data = await res.json();
                userName = data.name;
                document.getElementById("appUserName").innerText = userName;
                
                // Load Previous History here if needed
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });

        // 2. Permanent Chat Logic (Saved to DB)
        window.sendAppChat = async function() {
            const input = document.getElementById("app-chat-input");
            const history = document.getElementById("app-chat-history");
            const msg = input.value.trim();
            if(!msg) return;

            // Render User Message
            history.innerHTML += `
                <div class="flex items-start space-x-4 max-w-3xl mx-auto w-full">
                    <div class="flex-1 text-right">
                        <p class="font-bold text-sm text-gray-800 mb-1">${userName}</p>
                        <div class="bg-[#00AEEF] text-white p-3 rounded-2xl rounded-tr-none inline-block text-left">${msg}</div>
                    </div>
                </div>`;
            input.value = '';
            history.scrollTop = history.scrollHeight;

            try {
                // Sent with Auth Header (Triggers Database Save in Backend)
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${userToken}` },
                    body: JSON.stringify({ message: msg, session_id: sessionId, user_name: userName })
                });
                const data = await res.json();
                
                // Render Bot Message
                history.innerHTML += `
                    <div class="flex items-start space-x-4 max-w-3xl mx-auto w-full mt-6">
                        <img src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/Gemini_Generated_Image_okdjp7okdjp7okdj.png?download=true" class="w-8 h-8 rounded-full border border-gray-200">
                        <div class="flex-1">
                            <p class="font-bold text-sm text-gray-800 mb-1">Doktura AI</p>
                            <div class="bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tl-none inline-block">${data.reply.replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>`;
                history.scrollTop = history.scrollHeight;
            } catch(e) {
                alert("Network error talking to Doktura AI.");
            }
        };
    </script>
</body>
</html>
