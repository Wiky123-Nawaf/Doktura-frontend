<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doktura - AI Medical Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1f2937; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-primary { background-color: #2e1a47; }
        .text-primary { color: #2e1a47; }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.05; z-index: -1; pointer-events: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col">

    <script>const API_BASE = 'https://api.doktura.ai';</script>

    <video autoplay loop muted playsinline class="video-bg">
        <source src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/Whisk_cjziljmkvmzhzjy10sohjjytetn5qtl0qwni1sn.mp4?download=true" type="video/mp4">
    </video>

    <!-- Navbar -->
    <nav class="flex items-center justify-between px-6 py-4 max-w-6xl mx-auto w-full z-10">
        <img src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/ChatGPT%20Image%20Mar%2026%2C%202026%2C%2007_53_48%20PM.png?download=true" alt="Logo" class="h-32">
        <a href="login.html" id="navLoginBtn" class="bg-[#00AEEF] text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-[#0099d1] shadow-md transition">Log In</a>
    </nav>

    <!-- Hero -->
    <main class="max-w-4xl mx-auto px-6 pt-12 pb-20 text-center relative flex-1 z-10">
        <img src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/Gemini_Generated_Image_okdjp7okdjp7okdj.png?download=true" class="w-64 h-64 object-contain mx-auto animate-[bounce_4s_infinite]">
        <h1 class="text-5xl font-bold mt-4 text-primary">Hi, I'm Doktura?</h1>
        <p class="mt-4 text-gray-600 max-w-2xl mx-auto text-lg">I'm your private and personal AI doctor.<br>My service is fast and free. I've already helped people <strong>23,819,892 times!</strong></p>
        <p class="mt-2 text-xs text-red-500 font-bold">If this is an emergency, call 911.</p>

        <!-- Guest Chat Box -->
        <div class="mt-12 bg-white rounded-2xl shadow-xl border overflow-hidden text-left max-w-3xl mx-auto flex flex-col h-[500px]">
            <div class="flex border-b shrink-0">
                <button class="flex-1 py-4 text-center border-bottom-2 border-[#2e1a47] text-[#2e1a47] font-bold">AI Assistant</button>
                <a href="login.html" class="flex-1 py-4 text-center text-gray-500 hover:bg-gray-50 flex items-center justify-center">
                    <span>Book Consultant</span><svg class="w-4 h-4 ml-1 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                </a>
            </div>
            <div class="p-6 flex flex-col flex-1 overflow-hidden">
                <div class="bg-yellow-50 text-yellow-800 text-xs px-3 py-2 rounded-lg mb-4">Log in to unlock Voice Interaction, Medical Reports, and Booking.</div>
                <div id="chat-history" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2">
                    <div class="flex items-start space-x-3"><img src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/Gemini_Generated_Image_okdjp7okdjp7okdj.png?download=true" class="w-8 h-8 rounded-full bg-gray-100 object-cover"><div class="bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tl-none text-sm max-w-[80%]">Hello! Type your symptoms below.</div></div>
                </div>
                <div class="flex space-x-2 shrink-0">
                    <input type="text" id="chat-input" placeholder="Type your symptoms here..." class="flex-1 border rounded-xl px-4 py-3 focus:outline-none text-sm" onkeypress="if(event.key === 'Enter') sendGuestChat()">
                    <button onclick="sendGuestChat()" class="bg-primary text-white px-6 py-3 rounded-xl text-sm font-medium">Send</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase Auth Check (Changes Login button to Dashboard if already logged in) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCrx9BPS8ficDzgVZMbJIb4b3PQ9IqEHLw",
            authDomain: "doktura-ai-907d8.firebaseapp.com",
            projectId: "doktura-ai-907d8",
            storageBucket: "doktura-ai-907d8.firebasestorage.app",
            messagingSenderId: "940024084363",
            appId: "1:940024084363:web:db934bd0fd644d61f7e18e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user && (user.emailVerified || user.providerData.some(p => p.providerId === 'google.com'))) {
                const btn = document.getElementById("navLoginBtn");
                btn.innerText = "Go to Dashboard";
                btn.href = "dashboard.html";
            }
        });
    </script>

    <!-- Guest Chat Logic -->
    <script>
        window.sendGuestChat = async function() {
            const input = document.getElementById('chat-input');
            const history = document.getElementById('chat-history');
            const message = input.value.trim();
            if(!message) return;

            history.innerHTML += `<div class="flex items-start justify-end space-x-3 mt-4"><div class="bg-[#00AEEF] text-white p-3 rounded-2xl rounded-tr-none text-sm max-w-[80%]">${message}</div></div>`;
            input.value = '';
            history.scrollTo({ top: history.scrollHeight, behavior: 'smooth' });

            try {
                let uid = localStorage.getItem("anon_user_id");
                if (!uid) { uid = "anon_" + Math.random().toString(36).substring(7); localStorage.setItem("anon_user_id", uid); }

                const res = await fetch(API_BASE + '/api/chat', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: message, session_id: "guest", user_id: uid })
                });
                const data = await res.json();
                history.innerHTML += `<div class="flex items-start space-x-3 mt-4"><img src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/Gemini_Generated_Image_okdjp7okdjp7okdj.png?download=true" class="w-8 h-8 rounded-full bg-gray-100 object-cover"><div class="bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tl-none text-sm max-w-[80%]">${data.reply.replace(/\n/g, '<br>')}</div></div>`;
                history.scrollTo({ top: history.scrollHeight, behavior: 'smooth' });
            } catch(e) {
                history.innerHTML += `<div class="text-center text-red-500 text-xs mt-2">Error connecting to AI.</div>`;
            }
        }
    </script>
</body>
</html>
