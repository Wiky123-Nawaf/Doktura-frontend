<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doktura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; } </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <script>const API_BASE = 'https://api.doktura.ai';</script>

    <div class="w-full flex justify-between absolute top-6 px-8">
        <a href="index.html" class="text-gray-500 hover:text-[#00AEEF] font-semibold text-sm flex items-center">← Back Home</a>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-[420px] p-10 relative">
        <div class="w-14 h-14 bg-[#e6f7ff] rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-7 h-7 text-[#00AEEF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        
        <div id="authAlertBox" class="hidden mb-4 p-3 text-xs rounded-lg text-center font-medium capitalize"></div>

        <!-- LOGIN VIEW -->
        <div id="authLoginView">
            <h2 class="text-xl font-bold text-gray-800 text-center mb-1">Welcome Back</h2>
            <p class="text-xs text-gray-500 text-center mb-6">Log in to your account.</p>
            <input type="email" id="loginEmail" placeholder="Email Address" class="w-full border rounded-lg px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#00AEEF]">
            <input type="password" id="loginPass" placeholder="Password" class="w-full border rounded-lg px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#00AEEF]">
            <button id="doLoginBtn" class="w-full bg-[#00AEEF] text-white font-bold py-3 rounded-lg mb-4">Login</button>
            <button id="doGoogleLoginBtn" class="w-full bg-white border text-gray-700 font-semibold py-3 rounded-lg flex justify-center mb-4"><img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 mr-2"> Sign in with Google</button>
            <div class="text-center text-xs text-gray-500 flex justify-between mt-4">
                <span onclick="switchView('forgot')" class="text-[#00AEEF] cursor-pointer hover:underline">Forgot Password?</span>
                <span onclick="switchView('register')" class="text-[#00AEEF] cursor-pointer hover:underline">Register New Account</span>
            </div>
        </div>

        <!-- REGISTER VIEW -->
        <div id="authRegisterView" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 text-center mb-6">Create Account</h2>
            <input type="email" id="regEmail" placeholder="Email Address" class="w-full border rounded-lg px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#00AEEF]">
            <input type="password" id="regPass" placeholder="Password" class="w-full border rounded-lg px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#00AEEF]">
            <button id="doRegisterBtn" class="w-full bg-[#00AEEF] text-white font-bold py-3 rounded-lg mb-4">Register & Verify</button>
            <p class="text-center text-xs text-gray-500"><span onclick="switchView('login')" class="text-[#00AEEF] cursor-pointer hover:underline">Back to Login</span></p>
        </div>

        <!-- FORGOT PASSWORD VIEW -->
        <div id="authForgotView" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 text-center mb-6">Reset Password</h2>
            <input type="email" id="forgotEmail" placeholder="Email Address" class="w-full border rounded-lg px-4 py-3 text-sm mb-4 focus:outline-none focus:border-[#00AEEF]">
            <button id="doForgotBtn" class="w-full bg-[#00AEEF] text-white font-bold py-3 rounded-lg mb-4">Send Reset Link</button>
            <p class="text-center text-xs text-gray-500"><span onclick="switchView('login')" class="text-[#00AEEF] cursor-pointer hover:underline">Back to Login</span></p>
        </div>

        <!-- PROFILE SETUP VIEW -->
        <div id="authProfileView" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 text-center mb-1">Complete Profile</h2>
            <p class="text-xs text-gray-500 text-center mb-6">Let's set up your patient file.</p>
            <label class="block text-[10px] uppercase text-gray-500 font-semibold mb-1">Profile Photo (Optional)</label>
            <input type="file" id="profilePhotoInput" accept="image/*" class="w-full border rounded-lg px-3 py-2 text-sm mb-4">
            <input type="text" id="profileName" placeholder="Full Name (e.g. Ahmad Razif)" class="w-full border rounded-lg px-4 py-3 text-sm mb-4">
            <input type="text" id="profilePhone" placeholder="Phone Number" class="w-full border rounded-lg px-4 py-3 text-sm mb-4">
            <button id="saveProfileBtn" class="w-full bg-[#00AEEF] text-white font-bold py-3 rounded-lg">Complete Setup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, sendPasswordResetEmail, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrx9BPS8ficDzgVZMbJIb4b3PQ9IqEHLw",
            authDomain: "doktura-ai-907d8.firebaseapp.com",
            projectId: "doktura-ai-907d8",
            storageBucket: "doktura-ai-907d8.firebasestorage.app",
            messagingSenderId: "940024084363",
            appId: "1:940024084363:web:db934bd0fd644d61f7e18e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let tempPhotoUrl = "";

        window.switchView = function(view) {
            document.getElementById("authAlertBox").classList.add("hidden");
            ["authLoginView", "authRegisterView", "authForgotView", "authProfileView"].forEach(v => document.getElementById(v).classList.add("hidden"));
            document.getElementById(view === 'login' ? "authLoginView" : view === 'register' ? "authRegisterView" : view === 'forgot' ? "authForgotView" : "authProfileView").classList.remove("hidden");
        }

        function showAlert(msg, isError=true) {
            const box = document.getElementById("authAlertBox");
            box.innerText = msg.replace("Firebase: Error (", "").replace(").", "");
            box.className = isError ? "mb-4 p-3 bg-red-50 text-red-600 text-xs rounded-lg text-center font-medium" : "mb-4 p-3 bg-green-50 text-green-600 text-xs rounded-lg text-center font-medium";
            box.classList.remove("hidden");
        }

        document.getElementById("doGoogleLoginBtn").addEventListener("click", async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { showAlert("Google Login Failed."); }
        });

        document.getElementById("doLoginBtn").addEventListener("click", async () => {
            document.getElementById("doLoginBtn").innerText = "Logging in...";
            try { await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPass").value); } 
            catch(e) { showAlert(e.message); document.getElementById("doLoginBtn").innerText = "Login"; }
        });

        document.getElementById("doRegisterBtn").addEventListener("click", async () => {
            document.getElementById("doRegisterBtn").innerText = "Creating...";
            try { 
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById("regEmail").value, document.getElementById("regPass").value); 
                await sendEmailVerification(cred.user);
                await signOut(auth);
                showAlert("Success! Check email for verification link.", false);
                setTimeout(() => switchView('login'), 2000);
            } catch(e) { showAlert(e.message); }
            document.getElementById("doRegisterBtn").innerText = "Register & Verify";
        });

        document.getElementById("doForgotBtn").addEventListener("click", async () => {
            try { await sendPasswordResetEmail(auth, document.getElementById("forgotEmail").value); showAlert("Link sent!", false); } 
            catch(e) { showAlert(e.message); }
        });

        // Backend Sync & Redirect logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const isGoogleAuth = user.providerData.some(p => p.providerId === 'google.com');
                if (!isGoogleAuth && !user.emailVerified) {
                    await signOut(auth);
                    showAlert("Please verify your email first.");
                    if(document.getElementById("doLoginBtn")) document.getElementById("doLoginBtn").innerText = "Login";
                    return;
                }

                try {
                    const token = await user.getIdToken();
                    const res = await fetch(`${API_BASE}/api/user/sync`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ email: user.email, name: user.displayName, photo_url: user.photoURL })
                    });
                    
                    const data = await res.json();
                    
                    if(data.is_complete) {
                        // All good, go to dashboard
                        window.location.href = "dashboard.html";
                    } else {
                        // Missing phone/name -> Force Profile Setup
                        tempPhotoUrl = data.photo_url || user.photoURL;
                        if(data.name) document.getElementById("profileName").value = data.name;
                        switchView('profile');
                    }
                } catch(e) { showAlert("Backend Sync Failed"); await signOut(auth); }
            }
        });

        document.getElementById("saveProfileBtn").addEventListener("click", async () => {
            const name = document.getElementById("profileName").value.trim();
            const phone = document.getElementById("profilePhone").value.trim();
            if(!name || !phone) return showAlert("Name and Phone are required.");
            
            document.getElementById("saveProfileBtn").innerText = "Saving...";
            let photoUrl = tempPhotoUrl;
            
            const fileInput = document.getElementById("profilePhotoInput");
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('user_id', auth.currentUser.uid);
                try {
                    const r = await fetch(`${API_BASE}/api/upload_avatar`, { method: 'POST', body: formData });
                    const d = await r.json(); if(d.success) photoUrl = d.photo_url;
                } catch(e) {}
            }

            try {
                const token = await auth.currentUser.getIdToken();
                await fetch(`${API_BASE}/api/user/profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, phone, photo_url: photoUrl })
                });
                window.location.href = "dashboard.html"; // Profile complete, redirect!
            } catch(e) { showAlert("Failed to save."); document.getElementById("saveProfileBtn").innerText = "Complete Setup"; }
        });
    </script>
</body>
</html>
