<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doktura AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } 
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <script>const API_BASE = 'https://api.doktura.ai';</script>

    <div id="authCloseBtnContainer" class="w-full flex justify-between absolute top-6 px-8">
        <a href="index.html" class="text-gray-500 hover:text-[#0066FF] font-semibold text-sm flex items-center transition">← Back Home</a>
    </div>

    <div class="bg-white rounded-2xl shadow-[0_2px_20px_rgba(0,0,0,0.04)] border border-gray-200 w-full max-w-[420px] p-10 relative">
        
        <!-- Updated Doktura AI Logo -->
        <img src="https://huggingface.co/NAwafo/SmolLM-Keyboard-GGUF/resolve/main/Logo.jpg?download=true" class="h-10 object-contain mx-auto mb-8" alt="Doktura AI">
        
        <div id="authAlertBox" class="hidden mb-4 p-3 text-xs rounded-lg text-center font-medium"></div>

        <!-- LOGIN VIEW -->
        <div id="authLoginView">
            <h2 class="text-2xl font-extrabold text-gray-900 text-center mb-1">Welcome Back</h2>
            <p class="text-sm text-gray-500 text-center mb-8">Log in to your account.</p>
            <input type="email" id="loginEmail" placeholder="Email Address" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            <input type="password" id="loginPass" placeholder="Password" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            <button id="doLoginBtn" class="w-full bg-[#0066FF] text-white font-bold py-3.5 rounded-lg shadow-sm mb-4 hover:bg-blue-700 transition">Login</button>
            <button id="doGoogleLoginBtn" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-3.5 rounded-lg flex justify-center items-center hover:bg-gray-50 shadow-sm transition mb-4">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 mr-3"> Sign in with Google
            </button>
            <div class="text-center text-xs text-gray-500 flex justify-between mt-6">
                <span onclick="switchView('forgot')" class="text-[#0066FF] cursor-pointer hover:underline font-bold transition">Forgot Password?</span>
                <span onclick="switchView('register')" class="text-[#0066FF] cursor-pointer hover:underline font-bold transition">Register New Account</span>
            </div>
        </div>

        <!-- REGISTER VIEW -->
        <div id="authRegisterView" class="hidden">
            <h2 class="text-2xl font-extrabold text-gray-900 text-center mb-6">Create Account</h2>
            <input type="email" id="regEmail" placeholder="Email Address" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            <input type="password" id="regPass" placeholder="Password" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            <button id="doRegisterBtn" class="w-full bg-[#0066FF] text-white font-bold py-3.5 shadow-sm rounded-lg w-full mb-6 hover:bg-blue-700 transition">Register & Verify</button>
            <p class="text-center text-sm text-gray-500 font-medium">Already have an account? <span onclick="switchView('login')" class="text-[#0066FF] cursor-pointer hover:underline font-bold transition">Log In</span></p>
        </div>

        <!-- FORGOT PASSWORD VIEW -->
        <div id="authForgotView" class="hidden">
            <h2 class="text-2xl font-extrabold text-gray-900 text-center mb-6">Reset Password</h2>
            <input type="email" id="forgotEmail" placeholder="Email Address" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            <button id="doForgotBtn" class="w-full bg-[#0066FF] text-white font-bold py-3.5 shadow-sm rounded-lg w-full mb-6 hover:bg-blue-700 transition">Send Reset Link</button>
            <p class="text-center text-sm text-gray-500 font-medium"><span onclick="switchView('login')" class="text-[#0066FF] cursor-pointer hover:underline font-bold transition">← Back to Login</span></p>
        </div>

        <!-- PROFILE SETUP VIEW -->
        <div id="authProfileView" class="hidden">
            <h2 class="text-2xl font-extrabold text-gray-900 text-center mb-1">Complete Profile</h2>
            <p class="text-sm text-gray-500 text-center mb-8">Let's set up your patient file.</p>
            
            <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-2">Profile Photo (Optional)</label>
            <input type="file" id="profilePhotoInput" accept="image/*" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm mb-5 bg-gray-50 transition cursor-pointer">
            
            <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-2">Full Name</label>
            <input type="text" id="profileName" placeholder="e.g. Ahmad Razif" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-5 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            
            <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-2">Phone Number</label>
            <input type="text" id="profilePhone" placeholder="+60 12-345-6789" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-8 focus:outline-none focus:ring-2 focus:ring-[#0066FF] transition">
            
            <button id="saveProfileBtn" class="w-full bg-[#0066FF] text-white font-bold py-3.5 rounded-lg shadow-sm hover:bg-blue-700 transition">Complete Setup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, sendPasswordResetEmail, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const app = initializeApp({ apiKey: "AIzaSyCrx9BPS8ficDzgVZMbJIb4b3PQ9IqEHLw", authDomain: "doktura-ai-907d8.firebaseapp.com", projectId: "doktura-ai-907d8" });
        const auth = getAuth(app);
        let tempPhotoUrl = "";

        window.switchView = function(view) {
            document.getElementById("authAlertBox").classList.add("hidden");
            ["authLoginView", "authRegisterView", "authForgotView", "authProfileView"].forEach(v => document.getElementById(v).classList.add("hidden"));
            if(view === 'profile') document.getElementById("authCloseBtnContainer").classList.add("hidden"); 
            else document.getElementById("authCloseBtnContainer").classList.remove("hidden");
            document.getElementById(view === 'login' ? "authLoginView" : view === 'register' ? "authRegisterView" : view === 'forgot' ? "authForgotView" : "authProfileView").classList.remove("hidden");
        }

        function showAlert(msg, isError=true) {
            const box = document.getElementById("authAlertBox"); box.innerText = msg;
            box.className = isError ? "mb-4 p-3 bg-red-50 text-red-700 text-xs rounded-lg font-bold text-center border border-red-100" : "mb-4 p-3 bg-green-50 text-green-700 text-xs rounded-lg font-bold text-center border border-green-100";
            box.classList.remove("hidden");
        }

        document.getElementById("doGoogleLoginBtn").addEventListener("click", async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { showAlert("Google Login Failed."); } });

        document.getElementById("doLoginBtn").addEventListener("click", async () => {
            const btn = document.getElementById("doLoginBtn"); btn.innerText = "Logging in..."; btn.disabled = true;
            try { await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPass").value); } 
            catch(e) { showAlert("Invalid Credentials."); btn.innerText = "Login"; btn.disabled = false;}
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const token = await user.getIdToken();
                    const res = await fetch(`${API_BASE}/api/user/sync`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, name: user.displayName, photo_url: user.photoURL }) });
                    const data = await res.json();
                    
                    if(data.is_complete) { window.location.href = "dashboard.html"; } 
                    else { tempPhotoUrl = data.photo_url || user.photoURL; if(data.name) document.getElementById("profileName").value = data.name; switchView('profile'); }
                } catch(e) { console.error(e); await signOut(auth); showAlert("Backend Sync Failed. Is Python running?"); document.getElementById("doLoginBtn").innerText="Login"; document.getElementById("doLoginBtn").disabled=false; }
            }
        });

        document.getElementById("saveProfileBtn").addEventListener("click", async () => {
            const name = document.getElementById("profileName").value.trim(); const phone = document.getElementById("profilePhone").value.trim();
            if(!name || !phone) return showAlert("Name and Phone are required.");
            document.getElementById("saveProfileBtn").innerText = "Saving..."; document.getElementById("saveProfileBtn").disabled = true;
            try {
                await fetch(`${API_BASE}/api/user/profile`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await auth.currentUser.getIdToken()}` }, body: JSON.stringify({ name, phone, photo_url: tempPhotoUrl }) });
                window.location.href = "dashboard.html";
            } catch(e) { showAlert("Failed to save."); document.getElementById("saveProfileBtn").innerText = "Complete Setup"; document.getElementById("saveProfileBtn").disabled = false;}
        });
    </script>
</body>
</html>
