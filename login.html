<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doktura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; background-color: #f9fafb; } </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <script>const API_BASE = 'https://api.doktura.ai';</script>

    <div id="authCloseBtnContainer" class="w-full flex justify-between absolute top-6 px-8">
        <a href="index.html" class="text-gray-500 hover:text-[#0066FF] font-semibold text-sm flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back Home
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-[420px] p-10 relative">
        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-[#0066FF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        
        <div id="authAlertBox" class="hidden mb-4 p-3 text-xs rounded-lg text-center font-medium capitalize"></div>

        <!-- LOGIN VIEW -->
        <div id="authLoginView">
            <h2 class="text-2xl font-bold text-gray-900 text-center mb-1">Welcome Back</h2>
            <p class="text-sm text-gray-500 text-center mb-8">Log in to your account.</p>
            <input type="email" id="loginEmail" placeholder="Email Address" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <input type="password" id="loginPass" placeholder="Password" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <button id="doLoginBtn" class="w-full bg-[#0066FF] text-white font-bold py-3.5 rounded-lg mb-4 hover:bg-blue-700 transition shadow-md">Login</button>
            <div class="flex items-center my-4"><div class="flex-1 border-t border-gray-200"></div><span class="px-3 text-xs text-gray-400 uppercase">OR</span><div class="flex-1 border-t border-gray-200"></div></div>
            <button id="doGoogleLoginBtn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3.5 rounded-lg flex justify-center items-center transition shadow-sm mb-4">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 mr-2"> Sign in with Google
            </button>
            <div class="text-center text-xs text-gray-500 flex justify-between mt-6">
                <span onclick="switchView('forgot')" class="text-[#0066FF] cursor-pointer hover:underline font-semibold">Forgot Password?</span>
                <span onclick="switchView('register')" class="text-[#0066FF] cursor-pointer hover:underline font-semibold">Register New Account</span>
            </div>
        </div>

        <!-- REGISTER VIEW -->
        <div id="authRegisterView" class="hidden">
            <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">Create Account</h2>
            <input type="email" id="regEmail" placeholder="Email Address" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <input type="password" id="regPass" placeholder="Password" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <button id="doRegisterBtn" class="w-full bg-[#0066FF] text-white font-bold py-3.5 hover:bg-blue-700 transition rounded-lg shadow-md mb-6">Register & Verify</button>
            <p class="text-center text-sm text-gray-500">Already have an account? <span onclick="switchView('login')" class="text-[#0066FF] cursor-pointer hover:underline font-semibold">Log In</span></p>
        </div>

        <!-- FORGOT PASSWORD VIEW -->
        <div id="authForgotView" class="hidden">
            <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">Reset Password</h2>
            <input type="email" id="forgotEmail" placeholder="Enter your Email Address" class="w-full border border-gray-300 rounded-lg px-4 py-3.5 text-sm mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <button id="doForgotBtn" class="w-full bg-[#0066FF] hover:bg-blue-700 transition text-white font-bold py-3.5 rounded-lg shadow-md mb-6">Send Reset Link</button>
            <p class="text-center text-sm text-gray-500"><span onclick="switchView('login')" class="text-[#0066FF] cursor-pointer hover:underline font-semibold">← Back to Login</span></p>
        </div>

        <!-- PROFILE SETUP VIEW (Forced for new accounts) -->
        <div id="authProfileView" class="hidden">
            <h2 class="text-2xl font-bold text-gray-900 text-center mb-1">Complete Profile</h2>
            <p class="text-sm text-gray-500 text-center mb-6">Let's set up your patient file.</p>
            <label class="block text-xs uppercase text-gray-500 font-bold mb-2">Profile Photo (Optional)</label>
            <input type="file" id="profilePhotoInput" accept="image/*" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-5 bg-gray-50">
            <label class="block text-xs uppercase text-gray-500 font-bold mb-2">Full Name</label>
            <input type="text" id="profileName" placeholder="e.g. Ahmad Razif" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm mb-5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <label class="block text-xs uppercase text-gray-500 font-bold mb-2">Phone Number</label>
            <input type="text" id="profilePhone" placeholder="+60 12-345-6789" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm mb-6 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <button id="saveProfileBtn" class="w-full bg-[#0066FF] hover:bg-blue-700 transition text-white font-bold py-3.5 rounded-lg shadow-md">Complete Setup</button>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, sendPasswordResetEmail, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrx9BPS8ficDzgVZMbJIb4b3PQ9IqEHLw",
            authDomain: "doktura-ai-907d8.firebaseapp.com",
            projectId: "doktura-ai-907d8"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let tempPhotoUrl = "";

        window.switchView = function(view) {
            document.getElementById("authAlertBox").classList.add("hidden");
            ["authLoginView", "authRegisterView", "authForgotView", "authProfileView"].forEach(v => document.getElementById(v).classList.add("hidden"));
            if(view === 'profile') document.getElementById("authCloseBtnContainer").classList.add("hidden"); 
            else document.getElementById("authCloseBtnContainer").classList.remove("hidden");
            document.getElementById(view === 'login' ? "authLoginView" : view === 'register' ? "authRegisterView" : view === 'forgot' ? "authForgotView" : "authProfileView").classList.remove("hidden");
        }

        function showAlert(msg, isError=true) {
            const box = document.getElementById("authAlertBox");
            box.innerText = msg.replace("Firebase: Error (", "").replace(").", "");
            box.className = isError ? "mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg text-center font-medium" : "mb-4 p-3 bg-green-50 border border-green-200 text-green-700 text-xs rounded-lg text-center font-medium";
            box.classList.remove("hidden");
        }

        document.getElementById("doGoogleLoginBtn").addEventListener("click", async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { showAlert("Google Login Failed."); }
        });

        document.getElementById("doLoginBtn").addEventListener("click", async () => {
            const btn = document.getElementById("doLoginBtn"); btn.innerText = "Logging in..."; btn.disabled = true;
            try { await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPass").value); } 
            catch(e) { showAlert(e.message); btn.innerText = "Login"; btn.disabled = false;}
        });

        document.getElementById("doRegisterBtn").addEventListener("click", async () => {
            const btn = document.getElementById("doRegisterBtn"); btn.innerText = "Creating..."; btn.disabled = true;
            try { 
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById("regEmail").value, document.getElementById("regPass").value); 
                await sendEmailVerification(cred.user);
                await signOut(auth);
                showAlert("Success! Check email for verification link.", false);
                setTimeout(() => switchView('login'), 3000);
            } catch(e) { showAlert(e.message); }
            btn.innerText = "Register & Verify"; btn.disabled = false;
        });

        document.getElementById("doForgotBtn").addEventListener("click", async () => {
            try { await sendPasswordResetEmail(auth, document.getElementById("forgotEmail").value); showAlert("Link sent! Check your inbox.", false); } 
            catch(e) { showAlert(e.message); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const isGoogleAuth = user.providerData.some(p => p.providerId === 'google.com');
                if (!isGoogleAuth && !user.emailVerified) {
                    await signOut(auth);
                    showAlert("Please verify your email first.");
                    if(document.getElementById("doLoginBtn")) { document.getElementById("doLoginBtn").innerText = "Login"; document.getElementById("doLoginBtn").disabled = false; }
                    return;
                }

                try {
                    const token = await user.getIdToken();
                    const res = await fetch(`${API_BASE}/api/user/sync`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ email: user.email, name: user.displayName, photo_url: user.photoURL })
                    });
                    const data = await res.json();
                    
                    if(data.is_complete) {
                        window.location.href = "dashboard.html"; 
                    } else {
                        tempPhotoUrl = data.photo_url || user.photoURL;
                        if(data.name) document.getElementById("profileName").value = data.name;
                        switchView('profile');
                    }
                } catch(e) { showAlert("Network sync failed. Retrying..."); }
            }
        });

        document.getElementById("saveProfileBtn").addEventListener("click", async () => {
            const name = document.getElementById("profileName").value.trim();
            const phone = document.getElementById("profilePhone").value.trim();
            if(!name || !phone) return showAlert("Name and Phone are required.");
            
            const btn = document.getElementById("saveProfileBtn"); btn.innerText = "Saving Profile..."; btn.disabled = true;
            let photoUrl = tempPhotoUrl;
            
            const fileInput = document.getElementById("profilePhotoInput");
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('user_id', auth.currentUser.uid);
                try {
                    const r = await fetch(`${API_BASE}/api/upload_avatar`, { method: 'POST', body: formData });
                    const d = await r.json(); if(d.success) photoUrl = d.photo_url;
                } catch(e) {}
            }

            try {
                const token = await auth.currentUser.getIdToken();
                await fetch(`${API_BASE}/api/user/profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, phone, photo_url: photoUrl })
                });
                window.location.href = "dashboard.html";
            } catch(e) { showAlert("Failed to save data. Please try again."); btn.innerText = "Complete Setup"; btn.disabled = false;}
        });
    </script>
</body>
</html>
